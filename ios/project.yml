# XcodeGen 프로젝트 스펙 — `xcodegen generate` 실행 시 RichSignal.xcodeproj 생성
name: RichSignal
options:
  bundleIdPrefix: com.personal
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

targets:
  RichSignal:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - RichSignal
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.personal.richsignal
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1"          # iPhone 전용
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        # 앱 아이콘 (Assets.xcassets/AppIcon.appiconset)
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # 개인용 사이드로딩: 본인 개발팀(Personal Team) 자동 서명
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: S93D25N8GG
    info:
      path: RichSignal/Info.plist
      properties:
        CFBundleDisplayName: RichSignal
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        # 백그라운드 갱신 (BGAppRefreshTask)
        UIBackgroundModes:
          - fetch
        BGTaskSchedulerPermittedIdentifiers:
          - com.personal.richsignal.refresh
        # 로컬 개발 서버(http://localhost, http://127.0.0.1) HTTP 허용 예외
        NSAppTransportSecurity:
          NSExceptionDomains:
            localhost:
              NSExceptionAllowsInsecureHTTPLoads: true
              NSIncludesSubdomains: true
            127.0.0.1:
              NSExceptionAllowsInsecureHTTPLoads: true
